<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG</title>
    <link rel="stylesheet" href="styles.css">

</head>

<body>

    <!-- Reference: https://www.joshwcomeau.com/svg/friendly-introduction-to-svg/ -->

    <style>
        circle {
            fill: hotpink;
            transition: r 400ms, cy 600ms;
        }

        button:hover circle,
        button:focus-visible circle {
            r: 50px;
            cy: 100px;
        }
    </style>

    <button>
        <svg width="100" height="100">
            <circle r="30" cx="50" cy="50" />
        </svg>
    </button>

</body>

</html>
